<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowers Available</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Flowers Available 🌺</h1>
  </header>

  <div class="header-spacer"></div>

  <main>

    <div class="product">
      <div class="product-image">
        <img
          src="https://hookok.com/wp-content/uploads/2024/01/flowerbouquet123andhanging-59-scaled.jpg"
          alt="Crochet Osteospermum Bouquet"
        >
        <span class="badge">New</span>
      </div>

      <h2><a href="#">Bouquet – Crochet Osteospermum</a></h2>

      <div class="product-details">
        <p>Product details hidden.</p>
      </div>

      <p class="product-desc">Beautiful Crochet Osteospermum Bouquet for sale. Perfect for
        romantic occasions such as weddings, birthdays, anniversaries and so on.</p>
    </div>

    <table class="product-specs">
      <tr><th>Feature</th><th>Details</th></tr>
      <tr><td>Weight</td><td>1kg</td></tr>
      <tr><td>Color</td><td>Red</td></tr>
      <tr><td>Material</td><td>Plastic</td></tr>
    </table>

    <div class="contact-form">
      <form>
        <fieldset>
          <legend>Contact Us</legend>
          <label for="name">Name:</label>
          <input type="text" id="name" name="name">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email">
          <button type="submit">Submit</button>
        </fieldset>
      </form>
    </div>

  </main>

  <footer>
    <p>@ 2026 My Garden</p>
  </footer>

</body>
</html>
